name: Build All Platforms

permissions:
  contents: write

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-server:
    name: Build Server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: server/go.sum

      - name: Build Server
        working-directory: server
        run: make build

      - name: Prepare server release asset
        shell: bash
        run: |
          mkdir -p release-assets/server
          cp server/termsync-server release-assets/server/termsync-server-linux-x64-v${GITHUB_REF_NAME#v}

      - name: Upload Server Binary
        uses: actions/upload-artifact@v4
        with:
          name: termsync-server-linux-x64
          path: release-assets/server/*
          if-no-files-found: error

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        working-directory: mobile-android
        run: chmod +x gradlew

      - name: Create signing keystore
        working-directory: mobile-android
        shell: bash
        run: |
          keytool -genkeypair -v -keystore termsync.keystore \
            -alias termsync \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass password123 \
            -keypass password123 \
            -dname "CN=TermSync, OU=CI, O=TermSync, L=Remote, S=Remote, C=CN"
          cat > app/key.properties <<'EOF'
          storePassword=password123
          keyPassword=password123
          keyAlias=termsync
          storeFile=../termsync.keystore
          EOF

      - name: Build APK
        working-directory: mobile-android
        run: ./gradlew assembleRelease

      - name: Prepare Android release asset
        working-directory: mobile-android
        shell: bash
        run: |
          mkdir -p release-assets
          cp app/build/outputs/apk/release/*.apk release-assets/termsync-android-v${GITHUB_REF_NAME#v}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: termsync-android-release
          path: mobile-android/release-assets/termsync-android-v*.apk
          if-no-files-found: error

  build-desktop:
    name: Build Desktop - ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            platform: windows-latest
            os: windows
            target: x86_64-pc-windows-msvc
          - name: macos-x64
            platform: macos-latest
            os: macos
            target: x86_64-apple-darwin
          - name: macos-arm64
            platform: macos-latest
            os: macos
            target: aarch64-apple-darwin
          - name: linux-x64
            platform: ubuntu-22.04
            os: linux
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0'

      - name: Build Tauri App (Windows)
        if: matrix.os == 'windows'
        working-directory: desktop/src-tauri
        run: cargo tauri build

      - name: Build Tauri App (macOS/Linux)
        if: matrix.os != 'windows'
        working-directory: desktop/src-tauri
        shell: bash
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Prepare Windows release assets
        if: matrix.os == 'windows'
        shell: bash
        run: |
          mkdir -p desktop/release-assets
          for file in desktop/src-tauri/target/release/bundle/msi/*.msi; do
            [ -e "$file" ] || continue
            cp "$file" "desktop/release-assets/termsync-desktop-windows-x64-v${GITHUB_REF_NAME#v}.msi"
          done
          for file in desktop/src-tauri/target/release/bundle/nsis/*.exe; do
            [ -e "$file" ] || continue
            cp "$file" "desktop/release-assets/termsync-desktop-windows-x64-v${GITHUB_REF_NAME#v}-setup.exe"
          done

      - name: Prepare macOS release assets
        if: matrix.os == 'macos'
        shell: bash
        run: |
          mkdir -p desktop/release-assets
          for file in desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg; do
            [ -e "$file" ] || continue
            cp "$file" "desktop/release-assets/termsync-desktop-${{ matrix.name }}-v${GITHUB_REF_NAME#v}.dmg"
          done

      - name: Prepare Linux release assets
        if: matrix.os == 'linux'
        shell: bash
        run: |
          mkdir -p desktop/release-assets
          for file in desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb; do
            [ -e "$file" ] || continue
            cp "$file" "desktop/release-assets/termsync-desktop-linux-x64-v${GITHUB_REF_NAME#v}.deb"
          done
          for file in desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage; do
            [ -e "$file" ] || continue
            cp "$file" "desktop/release-assets/termsync-desktop-linux-x64-v${GITHUB_REF_NAME#v}.AppImage"
          done

      - name: Upload Windows installers
        if: matrix.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: termsync-desktop-windows-x64
          path: desktop/release-assets/*
          if-no-files-found: warn

      - name: Upload macOS DMGs
        if: matrix.os == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: termsync-desktop-${{ matrix.name }}
          path: desktop/release-assets/*
          if-no-files-found: warn

      - name: Upload Linux packages
        if: matrix.os == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: termsync-desktop-linux-x64
          path: desktop/release-assets/*
          if-no-files-found: warn

  create-release:
    name: Create Release
    needs: [build-server, build-android, build-desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show downloaded artifacts
        shell: bash
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
